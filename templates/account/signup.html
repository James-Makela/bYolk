{% extends 'base.html' %}

{% block content %}
  <div class="flex items-center justify-center w-full mt-10">
    <form method="post" action="{% url 'account_signup' %}" class="w-full max-w-sm">
      {% csrf_token %}
      <fieldset class="fieldset bg-base-200 border-base-300 rounded-box border p-6">
        <legend class="fieldset-legend">Create Account</legend>

        {% for field in form %}
          <div class="form-control">
            <label class="label" for="{{ field.id_for_label }}">
              <span class="label-text">{{ field.label }}</span>
            </label>
            <input
              type="{{ field.field.widget.input_type|default:'text' }}"
              name="{{ field.html_name }}"
              id="{{ field.id_for_label }}"
              class="input w-full {% if field.errors %}input-error{% endif %}"
              placeholder="{{ field.label }}"
            />
            {% if field.errors %}
              <label class="label">
                <span class="label-text-alt text-error">{{ field.errors.0 }}</span>
              </label>
            {% endif %}
            {% if field.help_text %}
              <label class="label">
                <span class="label-text-alt opacity-70 whitespace-normal">{{ field.help_text|safe }}</span>
              </label>
            {% endif %}
          </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary mt-6 w-full">Sign Up</button>
      </fieldset>
    </form>
  </div>
{% endblock content %}
