name: Django CI
on: [push]

jobs:
  test-suite:
    runs-on: docker 
    
    container:
      image: python:3.14.4-bookworm 

    steps:
      - name: Checkout
        run: |
          git clone https://forgejo.silverbrick.net$FORGEJO_URL/$FORGEJO_REPOSITORY .
          git checkout $FORGEJO_SHA

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Tests
        env:
          # Add any necessary env vars (like a dummy SECRET_KEY)
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "False"
        run: |
          python manage.py test
