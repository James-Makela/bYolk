name: Django CI
on: [push]

jobs:
  test-suite:
    runs-on: docker 
    
    container:
      image: python:3.14.4-bookworm 

    services:
      db:
        image: postgres:18
        env:
          POSTGRES_DB: budgetmaker
          POSTGRES_USER: budgetmaker
          POSTGRES_HOST_AUTH_METHOD: trust

    steps:
      - name: Checkout
        run: |
          git clone https://forgejo.silverbrick.net$FORGEJO_URL/$FORGEJO_REPOSITORY .
          git checkout $FORGEJO_SHA

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create .env file
        run: |
          echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" > .env
          echo "DEBUG_MODE=True" >> .env
          echo "POSTGRES_DB=budgetmaker" >> .env
          echo "POSTGRES_USER=budgetmaker" >> .env
          echo "POSTGRES_HOST=db" >> .env
          echo "POSTGRES_PORT=5432" >> .env
      - name: Run Django Tests
        run: |
          python manage.py test
