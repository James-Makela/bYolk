<div class="overflow-x-auto rounded-lg border border-base-300" id="transactions-container">

    {% if filter.qs %}

        <table class="table">
            <thead class="bg-base-200 text-base-content">
                <tr>
                    <th class="px-6 py-3">Date</th>
                    <th class="px-6 py-3">Vendor</th>
                    <th class="px-6 py-3">Purchase Type</th>
                    <th class="px-6 py-3">Amount</th>
                </tr>
            </thead>

            <tbody>
                {% for transaction in filter.qs %}
                    <tr class="hover:sky-950">
                        <td>{{ transaction.date }}</td>
                        <td>{{ transaction.vendor }}</td>
                        <td>{{ transaction.purchase_type }}</td>
                        <td>${{ transaction.amount|default_if_none:"-" }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

    {% else %}

        <p class="text-2xl">
            No transactions found
        </p>
    {% endif %}
</div>
