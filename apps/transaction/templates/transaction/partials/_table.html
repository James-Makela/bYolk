<div class="overflow-hidden rounded-lg border border-base-300">
  <table class="table w-full bg-base-100 border-hidden">
    {% if transactions %}
      <thead class="bg-base-200/50">
        <tr class="text-xs uppercase opacity-60">
          <th>Date</th>
          <th>Vendor</th>
          <th>Transaction Type</th>
          <th>Receipt Details</th>
          <th class="text-right">Amount</th>
        </tr>
      </thead>
      <tbody class="[&_tr:last-child]:border-none">
        {% for tx in transactions %}
          <tr class="border-base-200">
            <td class="whitespace-nowrap">{{ tx.date }}</td>
            <td>{{ tx.vendor }}</td>
            <td>{{ tx.purchase_type }}</td>
            <td>{{ tx.receipt_details }}</td>
            <td class="text-right font-semibold {% if tx.is_positive %}text-success{% else %}text-error{% endif %}">${{ tx.amount }}</td>
          </tr>
        {% endfor %}
      </tbody>
    {% else %}
      <tbody>
        <tr>
          <td class="text-center py-2">No assigned transactions for this cost allocation.</td>
        </tr>
      </tbody>
    {% endif %}
  </table>
</div>
