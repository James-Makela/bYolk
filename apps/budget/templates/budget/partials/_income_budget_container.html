<div class="overflow-visible rounded-lg border border-base-300 mt-2 bg-base-100">

  <div class="grid grid-cols-10 gap-2 bg-base-200 px-4 py-3 text-xs font-bold uppercase tracking-wider opacity-70 text-base-content">
    <div class="col-span-3">Income Source</div>
    <div class="col-span-2 text-left">Expected date</div>
    <div class="col-span-1 text-right">Expected</div>
    <div class="col-span-1 text-right">Paid</div>
    <div class="col-span-1 text-right">Remaining</div>
    <div class="col-span-2"></div>
  </div>

  <div class="divide-y divide-base-300">
    {% include "budget/partials/_allocation_table.html" with allocations=incomes %}

    {% if not incomes %}
      <div class="py-3 text-center text-sm opacity-60">
        No income allocated for this period.
      </div>
    {% endif %}
  </div>

  <div class="grid grid-cols-10 gap-2 bg-base-200/50 px-4 py-3 font-bold text-base-content border-t border-base-300">
    <div class="col-span-8 text-right">Total Income:</div>
    <div class="col-span-2 text-left text-success">
      ${{ budget.get_total_income|floatformat:2 }}
    </div>
  </div>

</div>
