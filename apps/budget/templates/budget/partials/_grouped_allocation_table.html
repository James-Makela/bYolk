{% for group in grouped_allocations %}
  <tr class="hover:bg-base-300 relative">
    <td colspan="10" class="p-0">
      <div class="collapse collapse-plus rounded-none border-b border-base-200 has-[:checked]:relative has-[:checked]:z-50 has-[:checked]:overflow-visible">
        <input type="checkbox" id="group_{{ forloop.counter }}" class="peer hidden" />

        <label for="group_{{ forloop.counter }}" class="collapse-title flex items-center w-full py-3 px-4 cursor-pointer">
          <div class="grid grid-cols-10 items-center w-full">
            <div class="font-bold col-span-3">{{ group.name }} ({{ group.original_items|length }})</div>
            <div class="col-span-2"></div>
            <div class="text-right font-bold col-span-1{% if group.remaining_spend > 0 %}text-success{% elif group.remaining_spend == 0 %}text-info{% else %}text-error{% endif %}">${{ group.remaining_spend }}</div>
            <div class="text-right col-span-1">${{ group.total_amount }}</div>
            <div class="text-right font-bold col-span-1">${{ group.total_paid }}</div>
            <div class="col-span-2"></div>
          </div>
        </label>

        <div class="collapse-content p-0">
          {% include "budget/partials/_allocation_table.html" with allocations=group.original_items %}
        </div>
      </div>
    </td>
  </tr>
{% endfor %}
