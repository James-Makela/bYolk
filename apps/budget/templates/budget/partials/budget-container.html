<h2 class="text-xl font-bold">Costs</h3>
<div class="overflow-x-auto rounded-lg border border-base-300 mt-2">
    <table class="table w-full">
        <!-- Header -->
        <thead class="bg-base-200 text-base-content">
            <tr>
                <th class="font-bold">Cost Name</th>
                <th class="font-bold text-right">Amount</th>
                <th class="font-bold text-right">Paid</th>
            </tr>
        </thead>
        <tbody>
            {% for allocation in allocations %}
                <tr class="hover:bg-base-300">
                    <td>{{ allocation.cost_name }}</td>
                    <td class="text-right">${{ allocation.cost_amount }}</td>
                    <td class="text-right">${{ allocation.paid_amount }}</td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="4">No cost allocations for this period.</td>
                </tr>
            {% endfor %}
        </tbody>
        <tfoot>
                <tr class="bg-base-200/50 font-bold">
                    <td colspan="2" class="text-right">Total Costs:</td>
                    <td class="text-right text-error">
                        ${{ budget.get_total_costs|floatformat:2 }}
                    </td>
                </tr>
        </tfoot>
    </table>
</div>
