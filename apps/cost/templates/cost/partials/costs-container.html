<div class="overflow-show rounded-lg border border-base-300" id="costs-container">
    {% if filter.qs %}

        <table class="table">
            <thead class="bg-base-200 text-base-content">
                <tr>
                    <th class="px-6 py-3">Cost</th>
                    <th class="px-6 py-3">Category</th>
                    <th class="px-6 py-3">Frequency</th>
                    <th class="px-6 py-3">Amount</th>
                    <th class="px-6 py-3"></th>
                </tr>
            </thead>

            <tbody>
                {% for cost in filter.qs %}
                    <tr class="hover:bg-base-300 {% if request.GET.updated == cost.id|slugify %}animate-flash-green{% endif %}">
                        <td>{{ cost.name }}</td>
                        <td>{{ cost.category }}</td>
                        <td>{{ cost.frequency_string }}</td>
                        <td>${{ cost.amount }}</td>
                        <td>
                            <div class="dropdown">
                                <div tabindex="0" role="button" class="btn btn-sm">Actions</div>
                                <ul tabindex="-1" class="dropdown-content menu bg-base-100 rounded-box z-1 w-42 p-2 shadow-sm">
                                    <li>
                                        <form action="{% url 'delete-cost' cost.pk %}" method="post" onsubmit="return confirm('Are you sure?')">
                                            {% csrf_token %}
                                            <button type="submit" class="text-error flex justify-between">
                                                Delete
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    </form>
                                </li>
                                <li>
                                    <a href="{% url 'edit-cost' cost.pk %}" class="flex justify-between items-center hover:text-primary">
                                        Edit
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                        </svg>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

    {% else %}

        <p class="text-2xl">
            No costs found
        </p>
    {% endif %}
</div>
