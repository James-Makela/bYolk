<div class="flex flex-col-reverse" id="costs-container">

    <div class="overflow-x-auto rounded-box border border-base-content/5 bg-base-100 m-5">
        {% if filter.qs %}

            <table class="table">
                <thead class="text-xs uppercase">
                    <tr>
                        <th class="px-6 py-3">Cost</th>
                        <th class="px-6 py-3">Category</th>
                        <th class="px-6 py-3">Frequency</th>
                        <th class="px-6 py-3">Amount</th>
                    </tr>
                </thead>

                <tbody>
                    {% for cost in filter.qs %}
                        <tr class="hover:sky-950">
                            <td>{{ cost.name }}</td>
                            <td>{{ cost.category }}</td>
                            <td>{{ cost.frequency_string }}</td>
                            <td>${{ cost.amount }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>

        {% else %}

            <p class="text-2xl">
                No costs found
            </p>
        {% endif %}
    </div>
</div>
