services:
  web:
    env_file:
        - .env
    build: .
    depends_on:
      db:
        condition: service_healthy

  db:
    env_file:
        - .env
    image: postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
